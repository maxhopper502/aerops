name: Deploy Client Form Only

on:
  workflow_dispatch:
  push:
    paths:
      - 'client-form/**'

permissions:
  contents: read

jobs:
  deploy-client-form:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - run: npx firebase-tools deploy --only hosting:jobs --project aerotech-ops --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
