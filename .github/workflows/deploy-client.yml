name: Deploy Client Portal
on:
  push:
    branches: [main]
    paths: ['aerotech-client-portal/**']
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd aerotech-client-portal && yarn install
      - run: cd aerotech-client-portal && yarn build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AEROTECH_CLIENTS }}
          channel: live
          projectId: aerotech-ops