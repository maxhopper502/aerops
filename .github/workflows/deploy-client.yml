name: Deploy Client Portal
on:
  push:
    branches: [main]
    paths: ['aerotech-client-portal/**', 'shared-firebase.json']
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: aerotech-client-portal/yarn.lock
      - run: cd aerotech-client-portal && yarn install --frozen-lockfile
      - run: cd aerotech-client-portal && yarn build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AEROTECH_CLIENTS }}
          channel: live
          projectId: aerotech-ops