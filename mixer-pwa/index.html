<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Aerotech Mixer</title>
<style>
:root{--navy:#1a3a5c;--blue:#2563eb;--green:#16a34a;--orange:#e67e22;--red:#dc2626;--gold:#ca8a04;--muted:#6b7280;--bg:#f0f2f5;--card:#fff;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh}
.hdr{background:var(--navy);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-title{font-size:1.05rem;font-weight:800;flex:1}
.hdr-sub{font-size:.72rem;opacity:.75}
.hdr-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;font-size:.72rem;font-weight:700;cursor:pointer}
.sync{font-size:.65rem;background:rgba(255,255,255,.12);border-radius:10px;padding:2px 8px;margin-left:auto}
.sync.ok{color:#86efac}.sync.conn{color:#fcd34d}
.screen{display:none;padding:16px;max-width:520px;margin:0 auto}
.screen.active{display:block}
/* Login */
.login-wrap{display:flex;flex-direction:column;align-items:center;padding:32px 16px;gap:14px}
.login-logo{font-size:3rem}
.login-title{font-size:1.3rem;font-weight:800;color:var(--navy)}
.mixer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px}
.mixer-btn{background:#fff;border:2px solid #e5e7eb;border-radius:12px;padding:14px 10px;cursor:pointer;font-weight:700;font-size:.9rem;color:var(--navy);text-align:center;transition:.15s}
.mixer-btn.sel{border-color:var(--blue);background:#eff6ff;color:var(--blue)}
.pin-row{display:flex;gap:10px;justify-content:center}
.pin-dot{width:44px;height:52px;background:#fff;border:2px solid #e5e7eb;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:var(--navy);transition:.15s}
.pin-dot.filled{border-color:var(--navy);background:#f0f4ff}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:260px;margin:0 auto;padding-top:4px}
.num-btn{background:#fff;border:2px solid #e5e7eb;border-radius:12px;padding:16px;font-size:1.2rem;font-weight:700;cursor:pointer;color:var(--navy);transition:.1s}
.num-btn:active{background:#e5e7eb}
.num-btn.del{color:var(--red)}
/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.sec-title{font-size:.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
/* Job cards */
.job-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;border-left:5px solid #dde1e8}
.job-card.spray{border-left-color:#2563eb}
.job-card.spread{border-left-color:#ca8a04}
.job-card.misting{border-left-color:#7c3aed}
.job-card.done{opacity:.65;border-left-color:#16a34a}
.jc-client{font-weight:800;font-size:.95rem;color:var(--navy)}
.jc-detail{font-size:.75rem;color:var(--muted);margin-top:2px}
.jc-tags{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.tag{font-size:.67rem;padding:3px 9px;border-radius:10px;font-weight:700;background:#f3f4f6;color:#374151}
.tag.blue{background:#dbeafe;color:#1e40af}
.tag.gold{background:#fef9c3;color:#854d0e}
.tag.purple{background:#ede9fe;color:#6d28d9}
/* LP grid */
.lp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.lp-cell{background:#f8fafb;border-radius:9px;padding:10px;text-align:center}
.lp-val{font-size:1.2rem;font-weight:800;color:var(--navy)}
.lp-lbl{font-size:.63rem;color:var(--muted);margin-top:2px;font-weight:600}
/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.tbl th{text-align:left;font-size:.67rem;color:var(--muted);font-weight:700;padding:4px 2px;border-bottom:1px solid #f0f2f5}
.tbl td{padding:7px 2px;border-bottom:1px solid #f5f5f5;vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
/* Load block */
.lb{background:#fff;border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.lb-hdr{padding:12px 14px;color:#fff;display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:.92rem}
.lb-hdr.spray{background:var(--blue)}
.lb-hdr.spread{background:var(--gold)}
.lb-hdr.misting{background:#7c3aed}
.lb-body{padding:12px 14px}
/* Product rows in mixing */
.pr{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f5f5f5;gap:10px}
.pr:last-child{border-bottom:none}
.pr-info{flex:1}
.pr-name{font-weight:700;font-size:.9rem;color:var(--navy)}
.pr-amt{font-size:.85rem;font-weight:700;color:var(--blue);margin-top:2px}
.pr-containers{font-size:.72rem;color:var(--muted);margin-top:4px;line-height:1.5}
.pr-containers .open{color:var(--orange);font-weight:700}
.pr-containers .leftover{color:var(--green);font-weight:700}
.pr-check{width:38px;height:38px;border-radius:50%;border:2.5px solid #dde1e8;background:none;cursor:pointer;font-size:1.1rem;flex-shrink:0;transition:.15s;display:flex;align-items:center;justify-content:center}
.pr-check.done{background:var(--green);border-color:var(--green);color:#fff}
/* ── Dark mixing screen ── */
.mx-bg{background:#0f1421;padding:14px;max-width:520px;margin:0 auto}
.mx-back-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:8px 14px;font-size:.82rem;font-weight:700;color:#94a3b8;cursor:pointer;margin-bottom:12px;display:inline-block}
.mx-job-card{background:#1e2433;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid rgba(255,255,255,.07)}
.mx-job-name{font-weight:900;font-size:.98rem;color:#f1f5f9;margin-bottom:8px}
.mx-job-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mx-job-lbl{font-size:.6rem;font-weight:700;color:#4b5a7a;text-transform:uppercase;letter-spacing:.5px}
.mx-job-val{font-size:.88rem;font-weight:700;color:#cbd5e1;margin-top:1px}
.mx-pbar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;margin:6px 0 3px}
.mx-pbar-fill{height:100%;background:#3b82f6;border-radius:3px;transition:.3s}
.mx-pbar-lbl{font-size:.68rem;color:#4b5a7a}
.mx-load-hdr{border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.mx-load-hdr.spray{background:linear-gradient(135deg,#1d4ed8,#2563eb)}
.mx-load-hdr.spread{background:linear-gradient(135deg,#92400e,#b45309)}
.mx-load-hdr.misting{background:linear-gradient(135deg,#5b21b6,#7c3aed)}
.mx-load-title{font-weight:900;font-size:1rem;color:#fff}
.mx-load-sub{font-size:.75rem;color:rgba(255,255,255,.7);font-weight:600}
.mx-prod{background:#1e2433;border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid rgba(255,255,255,.07)}
.mx-prod.done-prod{opacity:.45}
.mx-prod-name{font-size:.68rem;font-weight:800;color:#f97316;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.mx-prod-amt{font-size:1.65rem;font-weight:900;color:#f1f5f9;line-height:1;display:inline}
.mx-prod-unit{font-size:.85rem;font-weight:600;color:#64748b;margin-left:5px}
.mx-containers{margin-top:10px;border-top:1px solid rgba(255,255,255,.06);padding-top:10px;font-size:.82rem;color:#64748b;line-height:1.9}
.mx-containers .copen{color:#f97316;font-weight:700}
.mx-containers .cleft{color:#4ade80;font-weight:600}
.mx-containers .cshort{color:#f87171;font-weight:700;display:block;margin-top:4px;padding:5px 9px;background:rgba(248,113,113,.1);border-radius:7px}
.mx-add-btn{width:100%;margin-top:11px;padding:12px;border-radius:9px;border:none;font-weight:800;font-size:.9rem;cursor:pointer;transition:.15s}
.mx-add-btn.add{background:#2563eb;color:#fff}
.mx-add-btn.added{background:#166534;color:#fff}
.mx-load-btn{width:100%;padding:16px;border-radius:12px;border:none;font-weight:900;font-size:1.05rem;cursor:pointer;margin-top:10px;letter-spacing:.2px}
.mx-load-btn.spray{background:#2563eb;color:#fff}
.mx-load-btn.spread{background:#b45309;color:#fff}
.mx-load-btn.misting{background:#7c3aed;color:#fff}
.mx-load-btn:disabled{background:#1e2433;color:#374151;cursor:not-allowed;border:1px solid rgba(255,255,255,.06)}
.mx-remaining{background:#1e2433;border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid rgba(255,255,255,.07)}
.mx-rem-title{font-size:.62rem;font-weight:800;color:#4b5a7a;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.mx-rem-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.85rem}
.mx-rem-row:last-child{border-bottom:none}
.mx-rem-name{color:#cbd5e1;font-weight:600}
.mx-rem-ok{color:#4ade80;font-weight:800}
.mx-rem-warn{color:#facc15;font-weight:800}
.mx-rem-low{color:#f87171;font-weight:800}
.mx-history{background:#181f2e;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid rgba(255,255,255,.05)}
.mx-history-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:.8rem;color:#4b5a7a}
.mx-history-row b{color:#94a3b8}
/* ── Job toggle bar (multi-job mixing) ── */
.mx-toggle-bar{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.mx-toggle-btn{flex:0 0 auto;padding:9px 16px;border-radius:20px;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#94a3b8;font-weight:700;font-size:.8rem;cursor:pointer;white-space:nowrap;transition:.15s}
.mx-toggle-btn.active{background:#2563eb;border-color:#2563eb;color:#fff}
.mx-toggle-btn.active.spread{background:#b45309;border-color:#b45309}
.mx-toggle-btn.done-job{border-color:#166534;color:#4ade80}
/* ── Pause button ── */
.mx-pause-btn{width:100%;padding:12px;border-radius:12px;border:2px solid rgba(255,255,255,.15);background:transparent;color:#94a3b8;font-weight:800;font-size:.9rem;cursor:pointer;margin-top:8px;letter-spacing:.2px;transition:.15s}
.mx-pause-btn:active{background:rgba(255,255,255,.08)}
/* ── Paused banner ── */
.mx-paused-banner{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:12px;padding:14px;text-align:center;margin-bottom:10px}
/* Buttons */
.load-btn{width:100%;padding:14px;border-radius:10px;border:none;font-weight:800;font-size:1rem;cursor:pointer;margin-top:12px;transition:.15s}
.load-btn.blue{background:var(--blue);color:#fff}
.load-btn.gold{background:var(--gold);color:#fff}
.load-btn.ghost{background:#f3f4f6;color:#374151;border:1.5px solid #dde1e8}
.load-btn:disabled{opacity:.45;pointer-events:none}
.btn{padding:9px 16px;border-radius:9px;border:none;font-weight:700;font-size:.85rem;cursor:pointer}
.btn-ghost{background:#f3f4f6;color:#374151;border:1.5px solid #dde1e8}
.btn-blue{background:var(--blue);color:#fff}
.back-btn{background:none;border:none;color:var(--blue);font-weight:700;font-size:.85rem;cursor:pointer;padding:0 0 12px 0;display:block}
.progress-bar{height:6px;background:#e5e7eb;border-radius:3px;margin:8px 0}
.progress-fill{height:100%;border-radius:3px;transition:.3s}
.progress-fill.spray{background:var(--blue)}
.progress-fill.spread{background:var(--gold)}
.progress-fill.misting{background:#7c3aed}
/* Stock */
.stock-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:.82rem}
.stock-row:last-child{border-bottom:none}
.s-ok{color:var(--green);font-weight:700}
.s-low{color:var(--red);font-weight:700}
.s-warn{color:var(--orange);font-weight:700}
/* Stock setup */
.stock-input-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.stock-input-row label{font-size:.75rem;font-weight:600;color:var(--muted);white-space:nowrap;min-width:80px}
.si{padding:7px 9px;border:1.5px solid #dde1e8;border-radius:8px;font-size:.85rem;font-family:inherit;width:80px;text-align:center}
.day-badge{background:var(--navy);color:#fff;border-radius:8px;padding:5px 12px;font-size:.75rem;font-weight:700;margin-bottom:12px;display:inline-block}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ei{font-size:2.5rem;margin-bottom:10px}
</style>
</head>
<body>

<script>
// ── SELF-CONTAINED LOGIN (no module dependency) ──────────────────
const MIXER_PINS={'Ben Simcock':'1111','Robert Proud':'2222','Amber Meyers':'3333','Shaun Dempsey':'4444'};
var _loginMixer='', _loginPin='';

function selMixer_(name){
  _loginMixer=name; _loginPin='';
  document.querySelectorAll('.mixer-btn').forEach(function(b){
    var first=b.querySelector('span') ? b.querySelector('span').textContent.trim() : '';
    b.classList.toggle('sel', name.indexOf(first)===0 && first.length>0);
  });
  var ps=document.getElementById('pin-section');
  if(ps) ps.style.display='block';
  _drawDots();
}

function numTap(k){
  if(!_loginMixer) return;
  if(k==='⌫') _loginPin=_loginPin.slice(0,-1);
  else if(_loginPin.length<4) _loginPin+=k;
  _drawDots();
  var err=document.getElementById('pin-err');
  if(err) err.textContent='';
  if(_loginPin.length===4){
    if(MIXER_PINS[_loginMixer]===_loginPin){
      localStorage.setItem('at_mixer',_loginMixer);
      // Direct call — no polling, no module dependency
      _doLogin(_loginMixer);
    } else {
      if(err) err.textContent='Wrong PIN — try again';
      _loginPin=''; _drawDots();
    }
  }
}

function _doLogin(name){
  // Show header
  var hdr=document.getElementById('hdr');
  var sub=document.getElementById('hdr-sub');
  if(hdr) hdr.style.display='flex';
  if(sub) sub.textContent='Signed in as '+name;
  // Switch screens
  document.querySelectorAll('.screen').forEach(function(s){
    s.classList.toggle('active', s.id==='s-jobs');
  });
  // Set date label
  var td=new Date();
  var el=document.getElementById('jobs-date');
  if(el) el.textContent=td.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
  // Show loading
  var jl=document.getElementById('jobs-list');
  if(jl) jl.innerHTML='<div class="empty"><div class="ei">⏳</div><p>Loading jobs…</p></div>';
  // Let the main script take over if it's loaded
  if(typeof window._appSetMixer==='function') window._appSetMixer(name);
}

function _drawDots(){
  for(var i=0;i<4;i++){
    var d=document.getElementById('pd'+i);
    if(!d) continue;
    d.textContent=_loginPin[i]?'●':'';
    d.className='pin-dot'+(_loginPin[i]?' filled':'');
  }
}

// Check auto-login on page load
document.addEventListener('DOMContentLoaded',function(){
  var saved=localStorage.getItem('at_mixer');
  if(saved&&MIXER_PINS[saved]){
    _doLogin(saved);
  }
});
</script>

  const caps={Urea:2000,Fertiliser:2400,'Snail Bait':2000,'Mouse Bait':1200,Seed:2000,Spray:3020};
  let hopper;
  if(spread){const pp=(j.products||[]).find(p=>SPREAD_TYPES.includes(p.type));hopper=parseFloat(j.hopperOverride)||(pp?caps[pp.type]||2000:2000);}
  else hopper=parseFloat(j.hopperOverride)||caps.Spray;
  const waterRate=parseFloat(j.waterRate)||30;
  const appRate=spread?(j.products||[]).reduce((s,p)=>s+(parseFloat(p.rate)||0),0)||1:waterRate;
  const totalUnits=totalHa*appRate;
  const loads=Math.max(1,Math.ceil(totalUnits/hopper));
  const haPerLoad=Math.round((totalHa/loads)*10000)/10000; // 4dp to avoid float explosion
  const perLoad=haPerLoad*appRate;
  const unit=spread?'kg':'L';
  return{spread,loads,hopper,totalUnits,perLoad,haPerLoad,unit,totalHa,appRate};
}

function jobClass(j){
  if((j.products||[]).some(p=>p.type==='Misting'))return'misting';
  if((j.products||[]).some(p=>SPREAD_TYPES.includes(p.type)))return'spread';
  return'spray';
}

// Build container arrays from {size,count} entries
function buildContainers(entries){
  const result=[];
  for(const e of entries){
    const size=parseFloat(e.size)||0,count=parseInt(e.count)||0;
    if(size>0&&count>0) for(let i=0;i<count;i++) result.push(size);
  }
  return result.sort((a,b)=>b-a); // largest first
}

// Compute how containers are used for a given amount
function calcContainerUsage(containers, amount){
  const lines=[];
  let remaining=amount;
  const state=[...containers]; // copy
  for(let i=0;i<state.length&&remaining>0.001;i++){
    const avail=state[i];
    if(avail<=0.001)continue;
    const used=Math.min(avail,remaining);
    remaining-=used;
    state[i]-=used;
    const leftover=state[i];
    lines.push({idx:i,size:containers[i],used,leftover});
  }
  return{lines,state,remaining};
}

var FSBASE='https://firestore.googleapis.com/v1/projects/aerotech-ops/databases/(default)/documents';
var FSKEY='AIzaSyC5Aw3OjP3Fmh1OeveOwSqlMgJyTfufzVI';

function fsVal(v){
  if(!v)return null;
  if(v.stringValue!==undefined)return v.stringValue;
  if(v.integerValue!==undefined)return parseInt(v.integerValue);
  if(v.doubleValue!==undefined)return parseFloat(v.doubleValue);
  if(v.booleanValue!==undefined)return v.booleanValue;
  if(v.arrayValue)return (v.arrayValue.values||[]).map(fsVal);
  if(v.mapValue){
    var o={};
    Object.keys(v.mapValue.fields||{}).forEach(function(k){o[k]=fsVal(v.mapValue.fields[k]);});
    return o;
  }
  return null;
}

function fsParseDoc(doc){
  var o={id:doc.name.split('/').pop()};
  Object.keys(doc.fields||{}).forEach(function(k){o[k]=fsVal(doc.fields[k]);});
  return o;
}

function fsUpdate(docId,data){
  var fields={};
  Object.keys(data).forEach(function(k){
    var v=data[k];
    if(typeof v==='string')fields[k]={stringValue:v};
    else if(typeof v==='number')fields[k]={doubleValue:v};
    else if(typeof v==='boolean')fields[k]={booleanValue:v};
    else if(v===null)fields[k]={nullValue:null};
    else if(Array.isArray(v)){fields[k]={arrayValue:{values:v.map(function(x){return typeof x==='string'?{stringValue:x}:{doubleValue:x};})}};}
    else if(typeof v==='object'){
      var mf={};Object.keys(v).forEach(function(mk){mf[mk]=typeof v[mk]==='string'?{stringValue:v[mk]}:{doubleValue:v[mk]};});
      fields[k]={mapValue:{fields:mf}};
    }
  });
  var mask=Object.keys(data).map(function(k){return'updateMask.fieldPaths='+k;}).join('&');
  return fetch(FSBASE+'/jobs/'+docId+'?'+mask+'&key='+FSKEY,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:fields})});
}

function fetchJobs(){
  fetch(FSBASE+'/jobs?pageSize=200&key='+FSKEY)
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(d){
      if(d.error){throw new Error(d.error.message);}
      jobs=(d.documents||[]).map(fsParseDoc);
      document.getElementById('sync-badge').textContent='✅ Live';
      document.getElementById('sync-badge').className='sync ok';
      renderJobs();
    })
    .catch(function(e){
      console.error('Fetch jobs error:',e);
      document.getElementById('sync-badge').textContent='⚠️ '+e.message;
      document.getElementById('sync-badge').className='sync conn';
      // Show error in jobs list too so it's visible
      var jl=document.getElementById('jobs-list');
      if(jl&&!jobs.length) jl.innerHTML='<div class="empty"><div class="ei">⚠️</div><p style="font-size:.8rem">'+e.message+'</p><button onclick="fetchJobs()" style="margin-top:10px;padding:8px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer">Retry</button></div>';
    });
}

window.useAllStock=function(prodIdx,haPerLoad,totalHa,rate,unit){

window.updateStockPreview=function(prodIdx,haPerLoad,rate,unit,totalHa){
  const entries=collectEntries(prodIdx);
  const containers=buildContainers(entries);
  const el=document.getElementById('stock-preview-'+prodIdx);
  const cb=document.getElementById('useall-'+prodIdx);
  if(!el)return;
  const totalStock=containers.reduce((s,c)=>s+c,0);

  // "Use all stock" mode: recalculate rate from total stock / total ha
  if(cb&&cb.checked){
    if(!totalStock){
      el.innerHTML=`<div style="color:var(--red);font-weight:700">⚠️ Enter container sizes first</div>`;
      cb.checked=false; delete cb.dataset.newRate; return;
    }
    const newRate=totalHa>0?totalStock/totalHa:0;
    const newPerLoad=newRate*haPerLoad;
    cb.dataset.newRate=newRate.toFixed(4);
    el.innerHTML=`<div style="background:#f0fdf4;border-radius:8px;padding:8px 10px;border:1px solid #86efac;margin-top:4px">
      <div style="font-weight:700;color:#166534;font-size:.82rem">✅ USE ALL STOCK — New rate calculated</div>
      <div style="margin-top:4px;font-size:.8rem">${totalStock.toFixed(2)} ${unit} ÷ ${totalHa.toFixed(2)} ha = <strong>${newRate.toFixed(2)} ${unit}/ha</strong></div>
      <div style="font-size:.75rem;color:var(--muted);margin-top:2px">Per load: ${newPerLoad.toFixed(2)} ${unit} · Loads will use all available stock evenly</div>
    </div>`;
    return;
  }

  // Normal mode: check if enough stock
  if(!containers.length){el.textContent='';return;}
  const totalNeeded=rate*totalHa;
  const perLoad=rate*haPerLoad;
  const shortage=totalNeeded-totalStock;
  let warn='';
  if(shortage>0.01){
    warn=`<div style="color:var(--red);font-weight:700;margin-top:4px;padding:4px 6px;background:#fee2e2;border-radius:6px">⚠️ SHORT by ${shortage.toFixed(2)} ${unit} — need ${totalNeeded.toFixed(2)}, have ${totalStock.toFixed(2)}<br><span style="font-size:.72rem;font-weight:500">Tick "Use all supplied stock" above to auto-adjust the rate.</span></div>`;
  } else {
    warn=`<div style="color:#166534;font-weight:700;margin-top:4px">✅ Enough stock — ${totalStock.toFixed(2)} ${unit} for ${totalNeeded.toFixed(2)} needed</div>`;
  }
  el.innerHTML=`<div style="font-size:.78rem"><strong>${totalStock.toFixed(2)} ${unit}</strong> on hand · <strong>${perLoad.toFixed(2)}</strong>/load · <strong>${(totalStock-perLoad).toFixed(2)}</strong> after load 1</div>${warn}`;
  delete cb.dataset.newRate; // Clear any previous override if box unchecked
};

function collectEntries(prodIdx){
  const entries=[];
  let i=0;
  while(true){
    const sEl=document.getElementById(`cs-${prodIdx}-${i}`);
    const cEl=document.getElementById(`cc-${prodIdx}-${i}`);
    if(!sEl||!cEl)break;
    entries.push({size:sEl.value,count:cEl.value});
    i++;
  }
  return entries;
}

window.saveStockSetup=function(){
  const j=jobs.find(j=>j.id===jobId);if(!j)return;
  const stock={};
  const rateOverrides={};
  (j.products||[]).forEach((_,i)=>{
    const entries=collectEntries(i);
    const containers=buildContainers(entries);
    stock[i]={entries,containers,state:[...containers]};

    if(cb&&cb.checked&&cb.dataset.newRate) rateOverrides[i]=parseFloat(cb.dataset.newRate);

  if(Object.keys(rateOverrides).length){

    overrides[jobId]=rateOverrides;
    localStorage.setItem('mixer_rate_overrides',JSON.stringify(overrides));
  }
  saveStock(jobId,stock);
  // Reset progress since stock changed
  saveProg(jobId,{load:0,checks:{},loadTimes:[]});
  goMixing(jobId);
};

      ?`<button class="load-btn ghost" onclick="resetJob()">↺ Reset Progress</button>`
      :`<div style="display:flex;gap:10px">
          <button class="load-btn ${cls==='spread'?'gold':'blue'}" onclick="goMixing('${j.id}')" style="flex:2">🧪 ${stock?'Continue Mixing':'Start Mixing'} — Load ${p.load+1}</button>
          <button class="load-btn ghost" onclick="goStock('${j.id}')" style="flex:1">📦 ${stock?'Edit Stock':'Enter Stock'}</button>
        </div>`
    }
  </div>

  <div class="card">
    <div class="sec-title">Paddocks</div>
    ${(j.paddocks||[]).map(p=>`<div style="display:flex;justify-content:space-between;font-size:.83rem;padding:5px 0;border-bottom:1px solid #f5f5f5"><span style="font-weight:600">${p.name||'—'}</span><span style="color:var(--muted)">${p.ha||0} ha</span></div>`).join('')}
  </div>`;

  document.getElementById('detail-wrap').innerHTML=html;
  show('s-detail');
};

/* ─── Mixing screen ─────────────────────────────────────────── */
window.goMixing=function(id){
  if(id)jobId=id;
  // Add this job to active mixing jobs if not already there (max 3)
  if(!activeJobIds.includes(jobId)) activeJobIds.push(jobId);
  if(activeJobIds.length>3) activeJobIds=activeJobIds.slice(-3);
  renderMixing();
  show('s-mixing');
};
function renderMixing(){
  const j=jobs.find(j=>j.id===jobId);if(!j)return;
  const ld=calcLoads(j);
  const cls=jobClass(j);
  const p=getProg(jobId);
  const stock=getStock(jobId)||{};
  const loadIdx=p.load;

  if(loadIdx>=ld.loads){goDetail(jobId);return;}

  const products=j.products||[];
  // Compute container usage for each product this load
  // Load any "use all stock" rate overrides saved for this job
  const rateOv=JSON.parse(localStorage.getItem('mixer_rate_overrides')||'{}')[jobId]||{};

  const usages=products.map((prod,i)=>{
    const rate=rateOv[i]!=null?rateOv[i]:(parseFloat(prod.rate)||0);
    const perLoad=rate*ld.haPerLoad;
    const st=stock[i];
    if(!st)return{perLoad,lines:[]};
    const usage=calcContainerUsage(st.state,perLoad);
    return{perLoad,rate,unit:prod.unit||ld.unit,...usage};
  });

  // Build toggle bar if > 1 active job
  let toggleBar='';
  if(activeJobIds.length>1){
    toggleBar='<div class="mx-toggle-bar">';
    activeJobIds.forEach(ajid=>{
      const aj=jobs.find(x=>x.id===ajid);if(!aj)return;
      const ajld=calcLoads(aj);
      const ajp=getProg(ajid);
      const ajDone=ajp.load>=ajld.loads;
      const ajCls=jobClass(aj);
      const isActive=ajid===jobId;
      const short=(aj.clientName||'—').split(' ').slice(0,2).join(' ');
      toggleBar+=`<button class="mx-toggle-btn${isActive?' active'+(ajCls==='spread'?' spread':''):''} ${ajDone?'done-job':''}"
        onclick="switchMixJob('${ajid}')">${short} (${ajp.load}/${ajld.loads})</button>`;
    });
    toggleBar+='</div>';
  }

  let html=`<div class="mx-bg">
  <button class="mx-back-btn" onclick="goDetail('${jobId}')">← Back to Job</button>
  ${toggleBar}`;
  <div class="mx-job-card">
    <div class="mx-job-name">${j.clientName||'—'} <span style="font-weight:400;font-size:.78rem;color:#4b5a7a">· ${j.airstrip||'—'}</span></div>
    <div class="mx-job-grid">
      <div><div class="mx-job-lbl">Pilot</div><div class="mx-job-val">${j.schedule?.pilot||'—'}</div></div>
      <div><div class="mx-job-lbl">Aircraft</div><div class="mx-job-val">${j.schedule?.aircraft||'—'}</div></div>
      <div><div class="mx-job-lbl">Total Area</div><div class="mx-job-val">${ld.totalHa.toFixed(0)} ha</div></div>
      <div><div class="mx-job-lbl">${ld.unit}/ha</div><div class="mx-job-val">${ld.appRate.toFixed(2)}</div></div>
      <div><div class="mx-job-lbl">Load Area</div><div class="mx-job-val">${ld.haPerLoad.toFixed(2)} ha</div></div>
      <div><div class="mx-job-lbl">Load Vol</div><div class="mx-job-val">${ld.perLoad.toFixed(0)} ${ld.unit}</div></div>
      <div><div class="mx-job-lbl">Total Vol</div><div class="mx-job-val">${ld.totalUnits.toFixed(0)} ${ld.unit}</div></div>
      <div><div class="mx-job-lbl">Loads</div><div class="mx-job-val">${ld.loads}</div></div>
    </div>
    ${j.hazards?.powerlines==='yes'?'<div style="background:rgba(248,113,113,.15);border-radius:8px;padding:6px 10px;font-size:.75rem;color:#f87171;font-weight:700;margin-bottom:6px">⚡ POWER LINES IN OR NEAR PADDOCK</div>':''}
    ${j.additionalComments?`<div style="font-size:.74rem;color:#64748b;margin-top:4px"><strong style="color:#94a3b8">Notes:</strong> ${j.additionalComments}</div>`:''}
    <div class="mx-pbar"><div class="mx-pbar-fill" style="width:${Math.round((loadIdx/ld.loads)*100)}%"></div></div>
    <div class="mx-pbar-lbl">${loadIdx} of ${ld.loads} loads complete</div>
  </div>
  <div class="mx-load-hdr ${cls}">
    <span class="mx-load-title">Load ${loadIdx+1} of ${ld.loads}</span>
    <span class="mx-load-sub">${j.schedule?.pilot||'—'} / ${(j.schedule?.aircraft||'—').replace('VH-','')}</span>
  </div>
  <div id="prod-checks">`;

  products.forEach((prod,i)=>{
    const usage=usages[i];
    const checked=(p.checks&&p.checks[loadIdx]&&p.checks[loadIdx][i])||false;

    // Container breakdown lines
    let containerHtml='';
    if(usage.lines&&usage.lines.length){
      containerHtml='<div class="mx-containers">';
      let cNum=0;
      usage.lines.forEach(l=>{
        cNum++;
        if(l.leftover>0.01){
          containerHtml+=`<div>• <strong style="color:#e2e8f0">Container ${cNum}:</strong> <span class="copen">${l.used.toFixed(2)} ${prod.unit||ld.unit}</span> <span style="color:#6b7a99">(${l.leftover.toFixed(2)} left in this container)</span></div>`;
        } else {
          containerHtml+=`<div>• <strong style="color:#e2e8f0">Container ${cNum}:</strong> <span class="copen">${l.used.toFixed(2)} ${prod.unit||ld.unit}</span></div>`;
        }
      });
      if(usage.remaining>0.01){
        containerHtml+=`<div style="color:var(--red);font-weight:700;margin-top:4px;padding:4px 6px;background:#fee2e2;border-radius:6px">⚠️ Short by ${usage.remaining.toFixed(2)} ${prod.unit||ld.unit}!</div>`;
      }
      containerHtml+='</div>';
    } else if(!stock[i]){
      containerHtml=`<div style="font-size:.72rem;color:var(--muted)">No stock entered — <a href="#" onclick="goStock('${jobId}');return false" style="color:var(--blue)">enter stock</a></div>`;
    }

    html+=`<div class="mx-prod${checked?' done-prod':''}" id="pr-${i}">
      <div class="mx-prod-name">${prod.name||'—'}</div>
      <span class="mx-prod-amt">${usage.perLoad.toFixed(2)}</span><span class="mx-prod-unit">${prod.unit||ld.unit} per load</span>
      ${containerHtml}
      <button class="mx-add-btn ${checked?'added':'add'}" id="pchk-${i}" onclick="toggleCheck(${i})">
        ${checked?'✅ Added':'✚ Add to mix'}
      </button>
    </div>`;
  });

  const isPaused=(p.paused===true);
  if(isPaused){
    html+=`</div>
    <div class="mx-paused-banner">
      <div style="font-size:1.2rem;margin-bottom:6px">⏸️</div>
      <div style="font-weight:800;color:#fbbf24;font-size:.95rem">Job Paused</div>
      <div style="font-size:.75rem;color:#94a3b8;margin-top:4px">Tap Resume to continue mixing load ${loadIdx+1}</div>
    </div>
    <button class="mx-load-btn ${cls}" onclick="resumeJob()">▶️ Resume — Load ${loadIdx+1}</button>`;
  } else {
    html+=`</div>
    <button class="mx-load-btn ${cls}" id="load-plane-btn" onclick="loadPlane()" disabled>
      ✈️ Load Plane — Load ${loadIdx+1}
    </button>
    <button class="mx-pause-btn" onclick="pauseJob()">⏸ Pause Job</button>`;
  }

  // Stock remaining after this load
  html+=`<div class="mx-remaining">
    <div class="mx-rem-title">📦 Product Remaining</div>`;
  products.forEach((prod,i)=>{
    const usage=usages[i];
    const st=stock[i];
    if(!st){html+=`<div class="mx-rem-row"><span class="mx-rem-name">${prod.name}</span><span style="color:#4b5a7a;font-size:.8rem">No stock data</span></div>`;return;}
    const remaining=usage.state.reduce((s,c)=>s+c,0);
    const effRate=rateOv[i]!=null?rateOv[i]:(parseFloat(prod.rate)||0);
    const loadsLeft=ld.loads-loadIdx-1;
    const needed=effRate*ld.haPerLoad*loadsLeft;
    const remCls=remaining<needed-0.1?'mx-rem-low':remaining<needed+1?'mx-rem-warn':'mx-rem-ok';
    html+=`<div class="mx-rem-row">
      <span class="mx-rem-name">${prod.name}</span>
      <span class="${remCls}">${remaining.toFixed(2)} ${prod.unit||ld.unit}</span>
    </div>`;
  });
  html+=`</div>`;

  // Load history — timestamps of loads already completed
  if(p.loadTimes&&p.loadTimes.length){
    html+=`<div class="mx-history">
      <div style="font-size:.6rem;font-weight:800;color:#4b5a7a;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">🕐 Load History</div>
      ${p.loadTimes.map(lt=>`<div class="mx-history-row"><b>Load ${lt.load}</b><span>${lt.time}</span></div>`).join('')}
    </div>`;
  }

  html+=`</div>`; // close mx-bg
  document.getElementById('mixing-wrap').innerHTML=html;
  const mxScr=document.getElementById('s-mixing');
  mxScr.style.background='#0f1421';
  mxScr.style.padding='0';
  mxScr.style.maxWidth='none';
  checkAllChecked(loadIdx,p,products);
}

window.toggleCheck=function(i){
  const p=getProg(jobId);
  const loadIdx=p.load;
  if(!p.checks)p.checks={};
  if(!p.checks[loadIdx])p.checks[loadIdx]={};
  p.checks[loadIdx][i]=!p.checks[loadIdx][i];
  saveProg(jobId,p);
  const btn=document.getElementById('pchk-'+i);
  const done=p.checks[loadIdx][i];
  btn.className='mx-add-btn '+(done?'added':'add');
  btn.textContent=done?'✅ Added':'✚ Add to mix';
  const j=jobs.find(j=>j.id===jobId);
  checkAllChecked(loadIdx,p,j.products||[]);
};

function checkAllChecked(loadIdx,p,products){
  if(p.paused)return; // don't enable load btn when paused
  const allDone=products.every((_,i)=>p.checks&&p.checks[loadIdx]&&p.checks[loadIdx][i]);
  const btn=document.getElementById('load-plane-btn');
  if(btn)btn.disabled=!allDone;
}

window.loadPlane=function(){
  const p=getProg(jobId);
  const j=jobs.find(j=>j.id===jobId);
  const ld=calcLoads(j);
  const stock=getStock(jobId)||{};
  const loadIdx=p.load;

  // Deduct container stock for this load
  const products=j.products||[];
  const rateOv2=JSON.parse(localStorage.getItem('mixer_rate_overrides')||'{}')[jobId]||{};
  products.forEach((prod,i)=>{
    const st=stock[i];if(!st)return;
    const rate=rateOv2[i]!=null?rateOv2[i]:(parseFloat(prod.rate)||0);
    const perLoad=rate*ld.haPerLoad;
    const usage=calcContainerUsage(st.state,perLoad);
    st.state=usage.state;
  });
  saveStock(jobId,stock);

  const now=new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
  p.loadTimes=p.loadTimes||[];
  p.loadTimes.push({load:loadIdx+1,time:now,mixer:mixerName});
  p.load=loadIdx+1;
  saveProg(jobId,p);

  if(p.load>=ld.loads){
    // Save to Firestore
    fsUpdate(jobId,{mixerNotes:{mixer:mixerName,completedAt:new Date().toISOString()}}).catch(function(){});
    // Remove from active job list
    activeJobIds=activeJobIds.filter(id=>id!==jobId);
    goDetail(jobId);
  } else {
    renderMixing();
  }
};

window.pauseJob=function(){
  const p=getProg(jobId);
  p.paused=true;
  saveProg(jobId,p);
  renderMixing();
};

window.resumeJob=function(){
  const p=getProg(jobId);
  p.paused=false;
  saveProg(jobId,p);
  renderMixing();
};

window.switchMixJob=function(newId){
  jobId=newId;
  renderMixing();
};

window.resetJob=function(){
  if(!confirm('Reset mixing progress?'))return;
  saveProg(jobId,{load:0,checks:{},loadTimes:[]});
  // Restore stock state from original containers
  const stock=getStock(jobId);
  if(stock){
    Object.keys(stock).forEach(i=>{stock[i].state=[...stock[i].containers];});
    saveStock(jobId,stock);
  }
  goDetail(jobId);
};

window.renderJobs=renderJobs;
</script>

      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-hover",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 鼠标离开事件处理
  function handleMouseOut(e) {
    if (!highlightEnabled) return;
    var relatedTarget = e.relatedTarget;

    // 如果鼠标移动到高亮相关元素上，不隐藏高亮
    if (relatedTarget && (relatedTarget === highlightBox || relatedTarget === tagLabel || relatedTarget === overlay || relatedTarget === selectedBox || relatedTarget === selectedLabel)) {
      return;
    }
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    try {
      window.parent.postMessage({
        type: "iframe-element-hover",
        data: null,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 点击事件处理
  function handleClick(e) {
    var target = e.target;
    if (!target || target === overlay || target === highlightBox || target === tagLabel || target === selectedBox || target === selectedLabel) {
      return;
    }

    // 避免处理 html 和 body 元素
    if (target === document.documentElement || target === document.body) {
      return;
    }

    // 检查是否是交互元素，这些元素需要保留默认行为
    var isInteractiveElement = ['input', 'textarea', 'select', 'button', 'a'].includes(target.tagName.toLowerCase());

    // 如果高亮功能启用，对于非交互元素阻止默认行为和事件传播
    if (highlightEnabled) {
      e.preventDefault();
      e.stopPropagation();
    }
    var rect = target.getBoundingClientRect();
    var selector = getElementSelector(target);
    var text = getElementText(target);
    var attributes = getElementAttributes(target);
    console.log("Element clicked:", {
      tagName: target.tagName,
      selector: selector,
      rect: rect
    });

    // 立即更新选中高亮
    updateSelectedHighlight(target);

    // 隐藏悬停高亮，因为现在是选中状态
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    var elementInfo = {
      tagName: target.tagName.toLowerCase(),
      rect: {
        left: rect.left,
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        width: rect.width,
        height: rect.height,
        x: rect.x,
        y: rect.y
      },
      selector: selector,
      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-click",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 监听来自父窗口的消息
  function handleParentMessage(event) {
    console.log("Received message from parent:", event.data);
    if (event.data.type === "iframe-highlight-toggle") {
      var enabled = event.data.enabled;
      console.log("Highlight toggle:", enabled);
      if (enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "enable-iframe-highlight") {
      console.log("Enable iframe highlight");
      enableHighlight();
    } else if (event.data.type === "disable-iframe-highlight") {
      console.log("Disable iframe highlight");
      disableHighlight();
    } else if (event.data.type === "toggle-iframe-highlight") {
      var _enabled = event.data.enabled !== undefined ? event.data.enabled : !highlightEnabled;
      console.log("Toggle iframe highlight to:", _enabled);
      if (_enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "update-selected-element") {
      var selector = event.data.selector;
      console.log("Update selected element with selector:", selector);
      if (selector) {
        try {
          var element = document.querySelector(selector);
          console.log("Found element by selector:", element);
          updateSelectedHighlight(element);
        } catch (error) {
          console.warn("Failed to select element:", error);
          updateSelectedHighlight(null);
        }
      } else {
        updateSelectedHighlight(null);
      }
    } else if (event.data.type === "clear-selected-element") {
      console.log("Clear selected element");
      updateSelectedHighlight(null);
    }
  }

  // 启用高亮功能
  function enableHighlight() {
    console.log("Enabling highlight");
    document.addEventListener("mouseover", handleMouseOver, true);
    document.addEventListener("mouseout", handleMouseOut, true);
    document.addEventListener("click", handleClick, true);
    highlightEnabled = true;
    overlay.style.display = "block";
  }

  // 禁用高亮功能
  function disableHighlight() {
    console.log("Disabling highlight");
    highlightEnabled = false;
    // 保持事件监听器，但通过 highlightEnabled 变量控制行为
    // 这样可以保留选中状态的显示
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    // 不隐藏 selectedBox 和 selectedLabel，保留选中状态
  }

  // 完全禁用高亮功能（移除所有监听器）
  function fullyDisableHighlight() {
    console.log("Fully disabling highlight");
    highlightEnabled = false;
    document.removeEventListener("mouseover", handleMouseOver, true);
    document.removeEventListener("mouseout", handleMouseOut, true);
    document.removeEventListener("click", handleClick, true);
    overlay.style.display = "none";
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    selectedBox.style.display = "none";
    selectedLabel.style.display = "none";
  }

  // 添加事件监听
  enableHighlight();
  window.addEventListener("message", handleParentMessage);

  // 暴露全局函数供外部调用
  window.__iframeHighlightControl = {
    enable: enableHighlight,
    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
</body>
